<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2009-2026年全国各省（不含港澳台）新能源汽车核心政策总数统计</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
        }
        #chart-container {
            width: 95vw;
            height: 95vh;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #333;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>2009-2026年全国各省（不含港澳台）新能源汽车核心政策总数统计</h1>
    <div id="chart-container"></div>

    <script>
        // 完整省级行政区 + 对应数值（全覆盖无遗漏）
        const dataList = [
            { name: '北京市', value: 38 },
            { name: '天津市', value: 28 },
            { name: '河北省', value: 33 },
            { name: '山西省', value: 23 },
            { name: '内蒙古自治区', value: 13 },
            { name: '辽宁省', value: 23 },
            { name: '吉林省', value: 23 },
            { name: '黑龙江省', value: 20 },
            { name: '上海市', value: 38 },
            { name: '江苏省', value: 43 },
            { name: '浙江省', value: 33 },
            { name: '安徽省', value: 28 },
            { name: '福建省', value: 28 },
            { name: '江西省', value: 28 },
            { name: '山东省', value: 38 },
            { name: '河南省', value: 28 },
            { name: '湖北省', value: 28 },
            { name: '湖南省', value: 28 },
            { name: '广东省', value: 48 },
            { name: '广西壮族自治区', value: 23 },
            { name: '海南省', value: 28 },
            { name: '重庆市', value: 28 },
            { name: '四川省', value: 28 },
            { name: '贵州省', value: 20 },
            { name: '云南省', value: 23 },
            { name: '西藏自治区', value: 13 },
            { name: '陕西省', value: 28 },
            { name: '甘肃省', value: 18 },
            { name: '青海省', value: 18 },
            { name: '宁夏回族自治区', value: 18 },
            { name: '新疆维吾尔自治区', value: 18 }
        ];

        // 循环配色（色彩饱满，不发灰）
        const colorArr = [
            '#e63946','#f77f00','#fcbf49','#06d6a0','#118ab2',
            '#073b4c','#7209b7','#3a0ca3','#4361ee','#4cc9f0',
            '#ff595e','#ffca3a','#8ac926','#1982c4','#6a4c93'
        ];

        const myChart = echarts.init(document.getElementById('chart-container'));

        const option = {
            tooltip: {
                trigger: 'item',
                formatter: '地区：{b}<br>数值：{c}'
            },
            polar: {
                radius: '82%'
            },
            angleAxis: {
                type: 'category',
                data: dataList.map(item => item.name),
                axisLabel: {
                    fontSize: 11,
                    color: '#222',
                    rotate: 15 // 文字轻微旋转，避免重叠
                },
                axisLine: { show: false },
                splitLine: { show: false }
            },
            radiusAxis: {
                min: 0,
                max: 60,
                interval: 10,
                axisLabel: { fontSize: 12 },
                splitLine: { color: '#eee' }
            },
            series: [
                {
                    name: '数据统计',
                    type: 'bar',
                    coordinateSystem: 'polar',
                    barWidth: '75%',
                    data: dataList.map((item, index) => {
                        return {
                            name: item.name,
                            value: item.value,
                            itemStyle: {
                                color: colorArr[index % colorArr.length],
                                borderColor: '#ffffff',
                                borderWidth: 1
                            }
                        }
                    }),
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 12,
                            shadowColor: 'rgba(0,0,0,0.35)'
                        }
                    }
                }
            ]
        };

        myChart.setOption(option);

        // 点击事件
        myChart.on('click', function(params) {
            if (params.componentType === 'series') {
                alert(`地区：${params.name}\n统计数值：${params.value}`);
            }
        });

        // 窗口自适应
        window.addEventListener('resize', () => {
            myChart.resize();
        })
    </script>
</body>
</html>
